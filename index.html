<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>koji</title>
    <meta name="description" content="i make videos when i feel like it">
    <link rel="icon" href="https://i.imgur.com/LpH1VuP.png">
    <style>
        /* globals */
        :root {
            --text: #c1c7c7;
            --glow: 0 0 16.5px #c1c7c7;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: url(https://r2.guns.lol/20d39f70-97a0-47a5-a774-ed64c90cbcd8.png) 16 16, auto !important;
        }
        
        body {
            background: #000;
            color: var(--text);
            font-family: 'Satoshi', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* backgrounds */
        #bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -2;
            opacity: 0;
            transition: opacity 500ms ease;
        }

        #yt {
            position: fixed;
            inset: 0;
            z-index: -2;
            pointer-events: none;
            opacity: 0;
            overflow: hidden;
            transition: opacity 500ms ease;
        }

        #yt iframe {
            position: absolute !important;
            top: 50% !important;
            left: 50% !important;
            width: 100vw !important;
            height: 56.25vw !important;
            min-width: 177.78vh !important;
            min-height: 100vh !important;
            transform: translate(-50%, -50%) scale(1.08) !important;
            filter: saturate(0.95) contrast(1.05);
        }
        
        #gif {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: url('https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExc2pzbHc4M2U0bWszejBjMzlsaGExZ2w5bGNlODdkam40ZHBnaHRraiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/uFmH8za4E6M5STIiTu/giphy.gif') center/cover;
            z-index: -2;
            display: none;
        }
        
        /* overlays */
        .dim {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.25);
            z-index: -1;
            pointer-events: none;
        }
        
        .scan {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: repeating-linear-gradient(rgba(0,0,0,0.5) 0, rgba(0,0,0,0.5) 1px, transparent 1px, transparent 2px);
            z-index: -1;
            pointer-events: none;
            opacity: 0.35;
        }
        
        /* enter screen */
        #enter {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 15px #fff;
            font-size: 30px;
        }
        
        /* main */
        #main {
            text-align: center;
            opacity: 0;
            pointer-events: none;
            user-select: none;
        }
        
        .name {
            font-size: 50px;
            font-weight: 600;
            margin: 0;
            text-shadow: var(--glow);
        }
        
        .bio {
            font-size: 24px;
            font-weight: 570;
            margin: 10px 0 0 0;
        }
        
        .links {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        
        .links a {
            color: var(--text);
            transition: transform 0.2s;
        }
        
        .links a:hover {
            transform: translateY(-3px);
        }
        
        .links svg { width: 35px; height: 35px; }
        
        /* views */
        .views {
            position: fixed;
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        
        .views-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(193,199,199,0.14);
            border-radius: 999px;
            padding: 9px 14px;
            font-weight: 550;
            font-size: 18px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.45);
            transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
        }

        .views-box:hover {
            transform: translateY(-2px);
            border-color: rgba(193,199,199,0.24);
            background: rgba(0,0,0,0.45);
        }

        .views-box svg {
            width: 18px;
            height: 18px;
            opacity: 0.9;
        }
        
        .views-label {
            font-size: 12px;
            opacity: 0.6;
            display: none;
        }
        
        /* mobile */
        @media (max-width: 768px) {
            * { cursor: default !important; }
            .name { font-size: 32px; }
            .bio { font-size: 18px; }
            .links svg { width: 36px; height: 36px; }
            .views { bottom: 5%; }
            .views-box { padding: 8px 12px; font-size: 16px; }
            .views-label { display: block; }
            .scan { display: none; }
        }
        
        @keyframes fadein {
            from { opacity: 0; transform: translateY(-10px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        
        .show {
            animation: fadein 0.7s forwards;
        }
    </style>
</head>
<body>
    <video id="bg" loop muted playsinline></video>
    <div id="yt" aria-hidden="true"></div>
    <div id="gif"></div>
    <div class="dim"></div>
    <div class="scan"></div>
    
    <div id="enter">click &lt;3</div>
    
    <div id="main">
        <h1 class="name">koji</h1>
        <p class="bio">i make videos when i feel like it</p>
        
        <div class="links">
            <a href="https://youtube.com/@Koji_z" target="_blank">
                <svg viewBox="1.99 5 20.01 14.01"><path d="M21.593 7.203a2.506 2.506 0 0 0-1.762-1.766C18.265 5.007 12 5 12 5s-6.264-.007-7.831.404a2.56 2.56 0 0 0-1.766 1.778c-.413 1.566-.417 4.814-.417 4.814s-.004 3.264.406 4.814c.23.857.905 1.534 1.763 1.765c1.582.43 7.83.437 7.83.437s6.265.007 7.831-.403a2.515 2.515 0 0 0 1.767-1.763c.414-1.565.417-4.812.417-4.812s.02-3.265-.407-4.831zM9.996 15.005l.005-6l5.207 3.005l-5.212 2.995z" fill="currentColor"/></svg>
            </a>
            <a href="https://discord.com/invite/7Z2zK9u2Vb" target="_blank">
                <svg viewBox="1.96 4.26 20.03 15.53"><path d="M14.82 4.26a10.14 10.14 0 0 0-.53 1.1a14.66 14.66 0 0 0-4.58 0a10.14 10.14 0 0 0-.53-1.1a16 16 0 0 0-4.13 1.3a17.33 17.33 0 0 0-3 11.59a16.6 16.6 0 0 0 5.07 2.59A12.89 12.89 0 0 0 8.23 18a9.65 9.65 0 0 1-1.71-.83a3.39 3.39 0 0 0 .42-.33a11.66 11.66 0 0 0 10.12 0q.21.18.42.33a10.84 10.84 0 0 1-1.71.84a12.41 12.41 0 0 0 1.08 1.78a16.44 16.44 0 0 0 5.06-2.59a17.22 17.22 0 0 0-3-11.59a16.09 16.09 0 0 0-4.09-1.35zM8.68 14.81a1.94 1.94 0 0 1-1.8-2a1.93 1.93 0 0 1 1.8-2a1.93 1.93 0 0 1 1.8 2a1.93 1.93 0 0 1-1.8 2zm6.64 0a1.94 1.94 0 0 1-1.8-2a1.93 1.93 0 0 1 1.8-2a1.92 1.92 0 0 1 1.8 2a1.92 1.92 0 0 1-1.8 2z" fill="currentColor"/></svg>
            </a>
        </div>
    </div>
    
    <div class="views">
        <div class="views-box">
            <svg viewBox="0 0 24 24"><path d="M12 9a3 3 0 0 0-3 3a3 3 0 0 0 3 3a3 3 0 0 0 3-3a3 3 0 0 0-3-3m0 8a5 5 0 0 1-5-5a5 5 0 0 1 5-5a5 5 0 0 1 5 5a5 5 0 0 1-5 5m0-12.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5" fill="currentColor"/></svg>
            <span id="count">0</span>
        </div>
        <div class="views-label">youtube views</div>
    </div>
    
    <script>
        // setup
        const enter = document.getElementById('enter')
        const main = document.getElementById('main')
        const bg = document.getElementById('bg')
        const gif = document.getElementById('gif')
        const count = document.getElementById('count')
        const viewsBox = document.querySelector('.views-box')
        const yt = document.getElementById('yt')
        
        let realCount = '...'
        const touch = 'ontouchstart' in window

        const playlist = 'PLFeE4sLplXslCiSt5KUCyT0Da73CkbxFM'
        const useyt = !touch && Math.random() < 0.6

        let ytplayer = null
        let ytok = false
        
        // device setup
        if (touch) {
            enter.textContent = 'tap <3'
            gif.style.display = 'block'
            bg.remove()
        }

        // preload yt
        if (!touch && useyt) {
            loadytapi().then(() => {
                ytplayer = new window.YT.Player('yt', {
                    playerVars: {
                        autoplay: 1, controls: 0, disablekb: 1, fs: 0, 
                        iv_load_policy: 3, modestbranding: 1, playsinline: 1, 
                        rel: 0, showinfo: 0, mute: 1, listType: 'playlist', list: playlist,
                    },
                    events: {
                        onReady: e => {
                            ytok = true
                            e.target.setVolume(0)
                            
                            // delay shuffle so playlist actually loads first to stop black screen
                            setTimeout(() => {
                                try {
                                    e.target.setShuffle(true)
                                    e.target.nextVideo()
                                } catch {}
                            }, 500)
                        },
                        onStateChange: e => {
                            // 0 means ended. play next video.
                            if (e.data === 0) {
                                try { e.target.nextVideo() } catch {}
                            }
                        },
                    },
                })
            }).catch(() => {})
        }

        function fadevolume(set, from, to, ms) {
            const start = performance.now()
            function step(now) {
                const t = Math.min(1, (now - start) / ms)
                set(from + (to - from) * t)
                if (t < 1) requestAnimationFrame(step)
            }
            requestAnimationFrame(step)
        }

        function loadytapi() {
            return new Promise(resolve => {
                if (window.YT && window.YT.Player) return resolve()
                const s = document.createElement('script')
                s.src = 'https://www.youtube.com/iframe_api'
                window.onYouTubeIframeAPIReady = () => resolve()
                document.head.appendChild(s)
            })
        }

        // start site
        function start() {
            enter.style.display = 'none'

            if (!touch) {
                if (useyt && ytok && ytplayer) {
                    yt.style.opacity = '1'
                    try { 
                        ytplayer.playVideo()
                        ytplayer.unMute() 
                        fadevolume(v => ytplayer.setVolume(v), 0, 40, 700) 
                    } catch {}
                } else {
                    yt.style.opacity = '0'
                    if (bg) {
                        bg.src = 'https://r2.guns.lol/290fd5f4-68d2-4608-b8db-ae8cac1cecfd.mp4'
                        bg.style.display = 'block'
                        bg.muted = false
                        bg.volume = 0
                        bg.play().then(() => {
                            bg.style.opacity = '1'
                            fadevolume(v => bg.volume = v, 0, 0.4, 700)
                        }).catch(() => {})
                    }
                }
            }

            main.classList.add('show')
            main.style.pointerEvents = 'auto'
        }
        
        enter.addEventListener('click', start)
        
        // title loop
        const word = '@koji'
        let i = 0
        let forward = true
        
        setInterval(() => {
            if (forward) {
                i++
                if (i === word.length) forward = false
            } else {
                i--
                if (i === 1) forward = true
            }
            document.title = word.substring(0, i)
        }, 400)
        
        // yt views
        const key = 'AIzaSyCTVfiag9MBGkifvzMzbx74KWbvATwj3V8'
        const id = 'UC3IG4vAafVfkfSRufBy3sJw'
        
        fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${id}&key=${key}`)
            .then(r => r.json())
            .then(d => {
                if (d.items && d.items[0]) {
                    realCount = parseInt(d.items[0].statistics.viewCount).toLocaleString()
                    count.textContent = realCount
                } else {
                    count.textContent = 'error'
                }
            })
            .catch(() => count.textContent = 'n/a')
        
        // hover
        if (!touch) {
            viewsBox.addEventListener('mouseover', () => count.textContent = 'youtube views')
            viewsBox.addEventListener('mouseout', () => count.textContent = realCount)
        }
    </script>
</body>
</html>
