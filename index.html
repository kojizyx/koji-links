<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>koji</title>
    <meta name="description" content="i make videos when i feel like it">
    <link rel="icon" href="https://i.imgur.com/LpH1VuP.png">
    <style>
        /* globals */
        :root {
            --text: #c1c7c7;
            --glow: 0 0 16.5px #c1c7c7;
        }
        
        * {
            box-sizing: border-box;
            cursor: url(https://r2.guns.lol/20d39f70-97a0-47a5-a774-ed64c90cbcd8.png) 16 16, auto;
        }
        
        body {
            background: #000;
            color: var(--text);
            font-family: 'Satoshi', sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        #bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            will-change: transform;
        }

        #yt {
            position: fixed;
            inset: 0;
            z-index: -2;
            pointer-events: none;
            opacity: 0;
        }

        #yt iframe {
            width: 100%;
            height: 100%;
        }
        
        #gif {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExc2pzbHc4M2U0bWszejBjMzlsaGExZ2w5bGNlODdkam40ZHBnaHRraiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/uFmH8za4E6M5STIiTu/giphy.gif') center/cover;
            z-index: -2;
            display: none;
        }
        
        .dim {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.25);
            z-index: -1;
            pointer-events: none;
        }
        
        .scan {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(rgba(0,0,0,0.5) 0, rgba(0,0,0,0.5) 1px, transparent 1px, transparent 2px);
            z-index: -1;
            pointer-events: none;
            opacity: 0.35;
        }
        
        #enter {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 15px #fff;
            font-size: 30px;
        }
        
        #main {
            text-align: center;
            opacity: 0;
            pointer-events: none;
            user-select: none;
        }
        
        .name {
            font-size: 50px;
            font-weight: 600;
            margin: 0;
            text-shadow: var(--glow);
        }
        
        .bio {
            font-size: 24px;
            font-weight: 570;
            margin: 10px 0 0 0;
        }
        
        .links {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        
        .links a {
            color: var(--text);
            transition: transform 0.2s;
        }
        
        .links a:hover {
            transform: translateY(-3px);
        }
        
        .links svg {
            width: 35px;
            height: 35px;
        }
        
        .views {
            position: fixed;
            bottom: 25%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        
        .views-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(193,199,199,0.14);
            border-radius: 999px;
            padding: 9px 14px;
            font-weight: 550;
            font-size: 18px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.45);
            transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
        }

        .views-box:hover {
            transform: translateY(-2px);
            border-color: rgba(193,199,199,0.24);
            background: rgba(0,0,0,0.45);
        }

        .views-box svg {
            width: 18px;
            height: 18px;
            opacity: 0.9;
        }
        
        .views-label {
            font-size: 12px;
            opacity: 0.6;
            display: none;
        }
        
        @media (max-width: 768px) {
            * { cursor: default !important; }
            .name { font-size: 32px; }
            .bio { font-size: 18px; }
            .links svg { width: 36px; height: 36px; }
            .views { bottom: 5%; }
            .views-box { padding: 8px 12px; font-size: 16px; }
            .views-label { display: block; }
            .scan { display: none; }
        }
        
        @keyframes fadein {
            from { opacity: 0; transform: translateY(-10px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
        
        .show {
            animation: fadein 0.7s forwards;
        }
    </style>
</head>
<body>
    <video id="bg" loop muted playsinline preload="none"></video>
    <div id="yt" aria-hidden="true"></div>
    <div id="gif"></div>
    <div class="dim"></div>
    <div class="scan"></div>
    
    <div id="enter">click &lt;3</div>
    
    <div id="main">
        <h1 class="name">koji</h1>
        <p class="bio">i make videos when i feel like it</p>
        
        <div class="links">
            <a href="https://youtube.com/@Koji_z" target="_blank">
                <svg viewBox="1.99 5 20.01 14.01">
                    <path d="M21.593 7.203a2.506 2.506 0 0 0-1.762-1.766C18.265 5.007 12 5 12 5s-6.264-.007-7.831.404a2.56 2.56 0 0 0-1.766 1.778c-.413 1.566-.417 4.814-.417 4.814s-.004 3.264.406 4.814c.23.857.905 1.534 1.763 1.765c1.582.43 7.83.437 7.83.437s6.265.007 7.831-.403a2.515 2.515 0 0 0 1.767-1.763c.414-1.565.417-4.812.417-4.812s.02-3.265-.407-4.831zM9.996 15.005l.005-6l5.207 3.005l-5.212 2.995z" fill="currentColor"/>
                </svg>
            </a>
            <a href="https://discord.com/invite/7Z2zK9u2Vb" target="_blank">
                <svg viewBox="1.96 4.26 20.03 15.53">
                    <path d="M14.82 4.26a10.14 10.14 0 0 0-.53 1.1a14.66 14.66 0 0 0-4.58 0a10.14 10.14 0 0 0-.53-1.1a16 16 0 0 0-4.13 1.3a17.33 17.33 0 0 0-3 11.59a16.6 16.6 0 0 0 5.07 2.59A12.89 12.89 0 0 0 8.23 18a9.65 9.65 0 0 1-1.71-.83a3.39 3.39 0 0 0 .42-.33a11.66 11.66 0 0 0 10.12 0q.21.18.42.33a10.84 10.84 0 0 1-1.71.84a12.41 12.41 0 0 0 1.08 1.78a16.44 16.44 0 0 0 5.06-2.59a17.22 17.22 0 0 0-3-11.59a16.09 16.09 0 0 0-4.09-1.35zM8.68 14.81a1.94 1.94 0 0 1-1.8-2a1.93 1.93 0 0 1 1.8-2a1.93 1.93 0 0 1 1.8 2a1.93 1.93 0 0 1-1.8 2zm6.64 0a1.94 1.94 0 0 1-1.8-2a1.93 1.93 0 0 1 1.8-2a1.92 1.92 0 0 1 1.8 2a1.92 1.92 0 0 1-1.8 2z" fill="currentColor"/>
                </svg>
            </a>
        </div>
    </div>
    
    <div class="views">
        <div class="views-box">
            <svg viewBox="0 0 24 24">
                <path d="M12 9a3 3 0 0 0-3 3a3 3 0 0 0 3 3a3 3 0 0 0 3-3a3 3 0 0 0-3-3m0 8a5 5 0 0 1-5-5a5 5 0 0 1 5-5a5 5 0 0 1 5 5a5 5 0 0 1-5 5m0-12.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5" fill="currentColor"/>
            </svg>
            <span id="count">0</span>
        </div>
        <div class="views-label">youtube views</div>
    </div>
    
    <script>
        // setup
        const enter = document.getElementById('enter')
        const main = document.getElementById('main')
        const bg = document.getElementById('bg')
        const gif = document.getElementById('gif')
        const count = document.getElementById('count')
        const viewsBox = document.querySelector('.views-box')
        const yt = document.getElementById('yt')
        
        let realCount = '0'
        const touch = 'ontouchstart' in window

        const ytkey = 'AIzaSyCTVfiag9MBGkifvzMzbx74KWbvATwj3V8'
        const playlist = 'PLFeE4sLplXslCiSt5KUCyT0Da73CkbxFM'
        const useyt = !touch && Math.random() < 0.6

        let ytplayer = null
        
        // device setup
        if (touch) {
            enter.textContent = 'tap &lt;3'
            gif.style.display = 'block'
            bg.remove()
        }

        function ensurebg() {
            if (!bg) return
            if (!bg.getAttribute('src')) bg.setAttribute('src', 'https://r2.guns.lol/290fd5f4-68d2-4608-b8db-ae8cac1cecfd.mp4')
        }

        function parseiso(s) {
            const m = s.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/)
            if (!m) return 0
            const h = parseInt(m[1] || '0')
            const min = parseInt(m[2] || '0')
            const sec = parseInt(m[3] || '0')
            return h * 3600 + min * 60 + sec
        }

        async function pickvideo() {
            const items = []
            let token = ''

            while (items.length < 50) {
                const u = new URL('https://www.googleapis.com/youtube/v3/playlistItems')
                u.searchParams.set('part', 'contentDetails')
                u.searchParams.set('maxResults', '50')
                u.searchParams.set('playlistId', playlist)
                u.searchParams.set('key', ytkey)
                if (token) u.searchParams.set('pageToken', token)

                const r = await fetch(u)
                const d = await r.json()
                if (!d.items) break
                for (const it of d.items) {
                    if (it.contentDetails?.videoId) items.push(it.contentDetails.videoId)
                }
                token = d.nextPageToken || ''
                if (!token) break
            }

            for (let tries = 0; tries < 8; tries++) {
                const chunk = []
                while (chunk.length < 30 && items.length) {
                    const id = items[Math.floor(Math.random() * items.length)]
                    if (!chunk.includes(id)) chunk.push(id)
                }

                const u = new URL('https://www.googleapis.com/youtube/v3/videos')
                u.searchParams.set('part', 'contentDetails')
                u.searchParams.set('id', chunk.join(','))
                u.searchParams.set('key', ytkey)

                const r = await fetch(u)
                const d = await r.json()
                const ok = (d.items || [])
                    .map(v => ({ id: v.id, dur: parseiso(v.contentDetails?.duration || '') }))
                    .filter(v => v.dur >= 60)

                if (ok.length) return ok[Math.floor(Math.random() * ok.length)].id
            }

            return ''
        }

        function loadytapi() {
            return new Promise(resolve => {
                if (window.YT && window.YT.Player) return resolve()
                const s = document.createElement('script')
                s.src = 'https://www.youtube.com/iframe_api'
                window.onYouTubeIframeAPIReady = () => resolve()
                document.head.appendChild(s)
            })
        }

        async function startyt() {
            try {
                const id = await pickvideo()
                if (!id) return false

                await loadytapi()

                yt.style.opacity = '0.001'
                ytplayer = new window.YT.Player('yt', {
                    videoId: id,
                    playerVars: {
                        autoplay: 1,
                        controls: 0,
                        disablekb: 1,
                        fs: 0,
                        iv_load_policy: 3,
                        modestbranding: 1,
                        playsinline: 1,
                        rel: 0,
                        showinfo: 0,
                        mute: 0,
                        loop: 1,
                        playlist: id,
                    },
                    events: {
                        onReady: e => {
                            try {
                                e.target.setVolume(40)
                                e.target.playVideo()
                            } catch {}
                        },
                        onStateChange: e => {
                            if (e.data === window.YT.PlayerState.ENDED) {
                                try { e.target.seekTo(0, true); e.target.playVideo() } catch {}
                            }
                        },
                    },
                })

                return true
            } catch {
                return false
            }
        }
        
        // start site
        function start() {
            enter.style.display = 'none'

            if (!touch) {
                ensurebg()
                bg.muted = true
                bg.play().catch(() => {})

                if (useyt) {
                    startyt().then(ok => {
                        if (!ok) {
                            yt.style.opacity = '0'
                            bg.muted = false
                            setTimeout(() => bg.volume = 0.25, 50)
                            bg.play().catch(() => {})
                        } else {
                            bg.muted = true
                        }
                    })
                } else {
                    bg.muted = false
                    setTimeout(() => bg.volume = 0.25, 50)
                    bg.play().catch(() => {})
                }
            }

            main.classList.add('show')
            main.style.pointerEvents = 'auto'
        }
        
        enter.addEventListener('click', start)
        
        // title
        const word = '@koji'
        let i = 0
        let forward = true
        
        setInterval(() => {
            if (forward) {
                i++
                if (i === word.length) forward = false
            } else {
                i--
                if (i === 1) forward = true
            }
            document.title = word.substring(0, i)
        }, 400)
        
        // youtube views
        const key = 'AIzaSyCTVfiag9MBGkifvzMzbx74KWbvATwj3V8'
        const id = 'UC3IG4vAafVfkfSRufBy3sJw'

        function setviews(v) {
            realCount = v
            count.textContent = v
        }

        fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${id}&key=${key}`)
            .then(r => {
                if (r.status === 403) throw new Error('forbidden')
                return r.json()
            })
            .then(d => {
                if (d.items?.[0]) {
                    setviews(parseInt(d.items[0].statistics.viewCount).toLocaleString())
                } else {
                    throw new Error('bad')
                }
            })
            .catch(() => {
                fetch(`https://r.jina.ai/https://www.youtube.com/channel/${id}/about`)
                    .then(r => r.text())
                    .then(t => {
                        const m = t.match(/\b([0-9][0-9,\.\s]*)\s*views\b/i)
                        if (m) setviews(m[1].replace(/\s/g, '').replace(/\.0+$/, ''))
                        else setviews('n/a')
                    })
                    .catch(() => setviews('n/a'))
            })
        
        // hover
        if (!touch) {
            viewsBox.addEventListener('mouseover', () => count.textContent = 'youtube views')
            viewsBox.addEventListener('mouseout', () => count.textContent = realCount)
        }
    </script>
</body>
</html>
